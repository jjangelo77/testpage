<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Configuração Agente SDR Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* SEU CSS INTACTO - mantive tudo igual */
        * { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            padding: 20px 0;
        }
        
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(20px);
            border-radius: 24px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.15); 
            overflow: hidden;
            animation: slideUp 0.8s ease-out;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
            font-weight: 300;
        }
        
        .content {
            padding: 50px 40px;
        }
        
        .section {
            margin-bottom: 40px;
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        
        .section:nth-child(1) { animation-delay: 0.1s; }
        .section:nth-child(2) { animation-delay: 0.2s; }
        .section:nth-child(3) { animation-delay: 0.3s; }
        .section:nth-child(4) { animation-delay: 0.4s; }
        .section:nth-child(5) { animation-delay: 0.5s; }
        
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
        
        .section-title {
            color: #1f2937;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding-left: 5px;
            border-left: 4px solid #4f46e5;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }
        
        .input, .select, .textarea {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
            font-family: inherit;
        }
        
        .input:focus, .select:focus, .textarea:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            transform: translateY(-2px);
        }
        
        .textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        
        @media (max-width: 768px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .header h1 { font-size: 2rem; }
            .content { padding: 30px 20px; }
        }
        
        .submit-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 20px 40px;
            border: none;
            border-radius: 16px;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.3);
        }
        
        .submit-btn:active {
            transform: translateY(-1px);
        }
        
        .submit-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            border: 4px solid #e5e7eb;
            border-top: 4px solid #10b981;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .success, .error {
            padding: 20px;
            border-radius: 16px;
            margin-top: 20px;
            display: none;
            font-weight: 500;
        }
        
        .success {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            color: #065f46;
            border: 1px solid #a7f3d0;
        }
        
        .error {
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        
        .premium-badge {
            display: inline-flex;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-robot"></i> Configuração Agente SDR <span class="premium-badge">Premium</span></h1>
            <p>Preencha para criarmos uma proposta ideal para você</p>
        </div>
        
        <div class="content">
            <form id="sdrForm">
                <!-- 1. NICHO -->
                <div class="section">
                    <h2 class="section-title"><i class="fas fa-store"></i> 1. Seu Nicho</h2>
                    <div class="grid-2">
                        <div class="form-group">
                            <label>Nicho/Empresa:</label>
                            <!-- ✅ CORRIGIDO: id="nichoSelect" -->
                            <select id="nichoSelect" name="nichoSelect" class="select" required>
                                <option value="">Selecione seu nicho...</option>
                                <option value="imobiliario">🏠 Imobiliário</option>
                                <option value="odontologia">🦷 Odontologia</option>
                                <option value="clinica">🏥 Clínica Médica</option>
                                <option value="advocacia">⚖️ Advocacia</option>
                                <option value="marketing">📈 Marketing Digital</option>
                                <option value="treinamento">📚 Cursos/Treinamentos</option>
                                <option value="outros">🎯 Outros</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Nome da empresa:</label>
                            <input type="text" name="empresa" class="input" placeholder="Ex: Imóveis Fortaleza" required>
                        </div>
                    </div>
                    <div id="nichoOutro" class="form-group" style="display:none;">
                        <label>Descreva seu serviço:</label>
                        <textarea name="nicho_outro" class="textarea" placeholder="Ex: Vendo apartamentos na praia"></textarea>
                    </div>
                </div>

                <!-- 2. NEGÓCIO -->
                <div class="section">
                    <h2 class="section-title"><i class="fas fa-chart-line"></i> 2. Seu Negócio</h2>
                    <div class="form-group">
                        <label>O que você vende/prestiga?</label>
                        <textarea name="produto" class="textarea" placeholder="Ex: Visitas a imóveis, consultas dentárias" required></textarea>
                    </div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label>Região principal:</label>
                            <input type="text" name="regiao" class="input" placeholder="Ex: Fortaleza, online" required>
                        </div>
                        <div class="form-group">
                            <label>Cliente ideal:</label>
                            <input type="text" name="cliente_ideal" class="input" placeholder="Ex: Famílias, empreendedores" required>
                        </div>
                    </div>
                </div>

                <!-- 3. LEADS -->
                <div class="section">
                    <h2 class="section-title"><i class="fas fa-users"></i> 3. Seus Leads</h2>
                    <div class="grid-2">
                        <div class="form-group">
                            <label>De onde vêm os leads?</label>
                            <input type="text" name="leads_origem" class="input" placeholder="Ex: WhatsApp, Instagram, site" required>
                        </div>
                        <div class="form-group">
                            <label>Quantos leads por semana?</label>
                            <input type="number" name="leads_qtd" class="input" placeholder="Ex: 20" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Onde os leads caem hoje?</label>
                        <input type="text" name="leads_onde" class="input" placeholder="Ex: Meu WhatsApp, Excel, CRM" required>
                    </div>
                </div>

                <!-- 4. ATENDIMENTO -->
                <div class="section">
                    <h2 class="section-title"><i class="fas fa-headset"></i> 4. Atendimento Atual</h2>
                    <div class="grid-2">
                        <div class="form-group">
                            <label>Quem responde hoje?</label>
                            <input type="text" name="quem_responde" class="input" placeholder="Ex: Eu mesmo, assistente" required>
                        </div>
                        <div class="form-group">
                            <label>Tempo médio resposta:</label>
                            <select name="tempo_resposta" class="select" required>
                                <option value="">Selecione...</option>
                                <option><1 hora</option>
                                <option>1-3 horas</option>
                                <option>3-24 horas</option>
                                <option>>24 horas</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Quais perguntas você faz para qualificar?</label>
                        <textarea name="perguntas_qualificacao" class="textarea" placeholder="Ex: 1. Quando quer? 2. Orçamento? 3. Localização?" required></textarea>
                    </div>
                </div>

                <!-- 5. CONFIGURAÇÕES -->
                <div class="section">
                    <h2 class="section-title"><i class="fas fa-cog"></i> 5. Configurações Avançadas</h2>
                    <div class="grid-3">
                        <div class="form-group">
                            <label><i class="fas fa-video"></i> Tipo de reunião:</label>
                            <select name="tipo_reuniao" class="select" required>
                                <option value="">Selecione...</option>
                                <option value="online">📱 Online (Zoom/Google Meet)</option>
                                <option value="presencial">📍 Presencial</option>
                                <option value="ambos">↔️ Ambos (flexível)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-clock"></i> Horários:</label>
                            <input type="text" name="horarios" class="input" placeholder="Ex: Seg-Sex 9h-18h" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-phone"></i> WhatsApp:</label>
                            <input type="tel" name="whatsapp_recebe" class="input" placeholder="(85) 99999-9999" required>
                        </div>
                    </div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label><i class="fas fa-bullseye"></i> Agendamentos/semana:</label>
                            <input type="number" name="agendamentos_desejados" class="input" placeholder="Ex: 10" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-volume-up"></i> Tom de voz:</label>
                            <select name="tom_voz" class="select" required>
                                <option value="">Selecione...</option>
                                <option>Formal/Profissional</option>
                                <option>Descontraído/Amigável</option>
                                <option>Consultivo/Especialista</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-sticky-note"></i> Observações extras:</label>
                        <textarea name="observacoes" class="textarea" placeholder="Qualquer detalhe importante..."></textarea>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <i class="fas fa-rocket"></i>
                    Enviar Informações
                </button>
            </form>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p><strong>Enviando suas informações...</strong><br><small>Em breve entramos em contato!</small></p>
            </div>

            <div class="success" id="successMsg"></div>
            <div class="error" id="errorMsg"></div>
        </div>
    </div>

    <!-- ✅ SCRIPT 100% CORRIGIDO -->
    <script>
        const SUPABASE_CONFIG = {
            url: 'https://bxzbabkngdveobfewuxp.supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4emJhYmtuZ2R2ZW9iZmV3dXhwIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc0OTMzOTA0NSwiZXhwIjoyMDY0OTE1MDQ1fQ.D3fmW-3TKhoB3MDO9Hdh45TFKNcYTiFVvItyKEjPOy8'
        };

        document.addEventListener('DOMContentLoaded', function() {
            // ✅ NichoSelect com ID correto
            const nichoSelect = document.getElementById('nichoSelect');
            if (nichoSelect) {
                nichoSelect.addEventListener('change', function() {
                    const nichoOutro = document.getElementById('nichoOutro');
                    if (nichoOutro) {
                        nichoOutro.style.display = this.value === 'outros' ? 'block' : 'none';
                    }
                });
            }

            // ✅ Form submit
            const sdrForm = document.getElementById('sdrForm');
            if (sdrForm) {
                sdrForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const btn = document.getElementById('submitBtn');
                    const loading = document.getElementById('loading');
                    const success = document.getElementById('successMsg');
                    const errorMsg = document.getElementById('errorMsg');
                    
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
                    loading.style.display = 'block';
                    success.style.display = 'none';
                    errorMsg.style.display = 'none';

                    try {
                        const formData = new FormData(this);
                        const dados = Object.fromEntries(formData);
                        
                        dados.ip = 'GitHub Pages Premium';
                        dados.data_cadastro = new Date().toISOString();
                        dados.status = 'premium';
                        
                        console.log('📤 Enviando:', dados);

                        const response = await fetch(`${SUPABASE_CONFIG.url}/rest/v1/sdr_formularios`, {
                            method: 'POST',
                            headers: {
                                'apikey': SUPABASE_CONFIG.key,
                                'Authorization': `Bearer ${SUPABASE_CONFIG.key}`,
                                'Content-Type': 'application/json',
                                'Prefer': 'return=minimal'
                            },
                            body: JSON.stringify([dados])
                        });

                        console.log('📡 Status:', response.status);

                        if (response.ok) {
                            success.innerHTML = `
                                <i class="fas fa-check-circle" style="font-size: 2rem; margin-bottom: 10px; display: block;"></i>
                                <strong>✅ Informações recebidas com sucesso!</strong><br>
                                <small><small>Analisaremos e entraremos em contato pelo WhatsApp em até 24h para construirmos seu Agente SDR</small>
`;
                            success.style.display = 'block';
                            this.reset();
                        } else {
                            const errorData = await response.text();
                            throw new Error(`HTTP ${response.status}: ${errorData}`);
                        }
                    } catch (error) {
                        console.error('❌ Erro:', error);
                        errorMsg.innerHTML = `
                            <i class="fas fa-exclamation-triangle" style="font-size: 1.5rem; margin-bottom: 10px; display: block;"></i>
                            Erro: ${error.message}
                        `;
                        errorMsg.style.display = 'block';
                    } finally {
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-rocket"></i> Enviar Formulário';
                        loading.style.display = 'none';
                    }
                });
            }
        });
    </script>
</body>
</html>
